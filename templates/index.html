<!DOCTYPE html>
<html>
<head>
    <title>Video QR Generator</title>
</head>
<body>

<h2>Upload Video & Generate QR</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="video" accept="video/*" required>
    <button type="submit">Upload</button>
</form>

{% if qr_image %}
    <h3>Your QR Code:</h3>

    <img src="{{ url_for('static', filename=qr_image) }}" width="300">

    <br><br>

    <!-- Download Button -->
    <a href="{{ url_for('static', filename=qr_image) }}" download>
        <button>Download QR Code</button>
    </a>

    <!-- Logout Button -->
    <a href="{{ url_for('logout') }}">
        <button style="float:right; background:red;">Logout</button>
    </a>
{% endif %}

</body>
</html>
